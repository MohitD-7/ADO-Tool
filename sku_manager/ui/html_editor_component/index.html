<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/htmlmixed/htmlmixed.min.js"></script>
<style id="dynamic-css"></style>
</head>
<body>
<div id="app"></div>
<script>
var Streamlit = (function() {
  var API_VERSION = 1;
  var RENDER_EVENT = "streamlit:render";
  var lastHeight = null;
  var renderHandlers = [];

  function sendBackMsg(type, data) {
    var payload = Object.assign({ isStreamlitMessage: true, type: type }, data || {});
    window.parent.postMessage(payload, "*");
  }

  function onMessageEvent(event) {
    if (!event.data || event.data.type !== RENDER_EVENT) return;
    var args = event.data.args || {};
    renderHandlers.forEach(function(handler) {
      handler({ args: args, disabled: Boolean(event.data.disabled), theme: event.data.theme });
    });
  }

  return {
    RENDER_EVENT: RENDER_EVENT,
    events: {
      addEventListener: function(type, handler) {
        if (type === RENDER_EVENT) renderHandlers.push(function(event) {
          handler({ detail: event });
        });
      }
    },
    setComponentReady: function() {
      window.addEventListener("message", onMessageEvent);
      sendBackMsg("streamlit:componentReady", { apiVersion: API_VERSION });
    },
    setFrameHeight: function(height) {
      height = height || document.body.scrollHeight;
      if (height !== lastHeight) {
        lastHeight = height;
        sendBackMsg("streamlit:setFrameHeight", { height: height });
      }
    },
    setComponentValue: function(value) {
      sendBackMsg("streamlit:setComponentValue", { value: value, dataType: "json" });
    }
  };
})();

var LIMIT = 10000;
var RULES = [];
var cm = null;
var counter = null;
var previewContent = null;
var currentArgs = {};
var lastSentPayload = "";
var parentClickHandler = null;
var parentMouseDownHandler = null;
var suppressChange = false;
var eventCounter = 0;
var commitTimer = null;
var lastSentValue = null;
var dirty = false;
var fullscreenActive = false;
var preFullscreenHeight = null;
var frameStyleBackup = null;
var FULLSCREEN_INSET = 14;
var auditMarkers = [];
var auditTimer = null;
var spellDictionary = null;
var spellDictionaryLoading = false;
var spellDictionaryFailed = false;
var MAX_AUDIT_MARKS = 450;
var TYPO_SCRIPT_URLS = [
  "https://cdn.jsdelivr.net/npm/typo-js@1.3.2/typo.js",
  "https://cdn.jsdelivr.net/gh/cfinke/Typo.js/typo/typo.js"
];
var SPELL_AFF_URLS = [
  "https://cdn.jsdelivr.net/npm/typo-js@1.3.2/dictionaries/en_US/en_US.aff",
  "https://cdn.jsdelivr.net/gh/cfinke/Typo.js/typo/dictionaries/en_US/en_US.aff"
];
var SPELL_DIC_URLS = [
  "https://cdn.jsdelivr.net/npm/typo-js@1.3.2/dictionaries/en_US/en_US.dic",
  "https://cdn.jsdelivr.net/gh/cfinke/Typo.js/typo/dictionaries/en_US/en_US.dic"
];
var SPELL_IGNORE_WORDS = Object.create(null);
"sku,skus,mpn,pdp,html,dropbox,hp,zbook,wquxga,intel,core,ultra,vpro,ssd,hdd,gb,tb,mb,usb,hdmi,wifi,wi,fi,bluetooth,smartbuy,workstation,touchscreen,notepad,dropdown,checkbox,checkboxes,textarea,href,nbsp,br".split(",").forEach(function(word) {
  SPELL_IGNORE_WORDS[word] = true;
});

function renderComponent(event) {
  var args = event.detail.args || {};
  currentArgs = args;
  RULES = Array.isArray(args.rules) ? args.rules : [];

  var css = String(args.css || "");
  var cssEl = document.getElementById("dynamic-css");
  if (cssEl.textContent !== css) cssEl.textContent = css;

  // A rerun echoes back the value this editor just committed. Repainting in
  // that case makes the whole editor (and its full-screen overlay) flash on
  // every pause in typing, so only repaint when the document actually changed.
  var valueChanged = true;
  if (!cm) {
    mountEditor(args);
  } else {
    var before = cm.getValue();
    applyIncomingValue(args);
    valueChanged = cm.getValue() !== before;
  }

  installParentNavigationSync();
  renderRulesBar();
  if (valueChanged) {
    updateCounter();
    updatePreview();
    ensureSpellDictionary();
    scheduleTextAudit(120);
    scheduleRepaint();
  }
}

var lastRulesBarJson = null;
function renderRulesBar() {
  var bar = document.getElementById("rules-bar");
  if (!bar) return;
  var rulesJson = JSON.stringify(RULES);
  if (rulesJson === lastRulesBarJson) return;
  lastRulesBarJson = rulesJson;
  if (!RULES.length) {
    bar.innerHTML = '<span class="rules-empty">No custom rules. Add some on the Editor Rules page.</span>';
    return;
  }
  var html = '<span class="rules-label">Rules:</span>';
  for (var i = 0; i < RULES.length; i++) {
    var r = RULES[i];
    var name = String(r.name || "Rule " + (i + 1));
    var sc = String(r.shortcut || "");
    var tip = sc ? (name + " (" + sc + ")") : name;
    html += '<button class="btn rule-btn" data-rule="' + i + '" title="' + tip.replace(/"/g, "&quot;") + '">' +
            name +
            (sc ? ' <span class="rule-kbd">' + sc + '</span>' : '') +
            '</button>';
  }
  bar.innerHTML = html;
  var btns = bar.querySelectorAll(".rule-btn");
  for (var j = 0; j < btns.length; j++) {
    btns[j].addEventListener("click", function() {
      var idx = Number(this.getAttribute("data-rule"));
      if (RULES[idx]) applyRuleInEditor(RULES[idx]);
    });
  }
}

var editorHeight = 320;
function setupResize(defaultHeight) {
  var stored = null;
  try { stored = parseInt(localStorage.getItem("vo_editor_height") || "", 10); } catch (e) {}
  editorHeight = (stored && stored >= 160) ? stored : defaultHeight;
  applyEditorHeight();
  var handle = document.getElementById("resize-handle");
  if (!handle) return;
  var startY = 0;
  var startH = editorHeight;
  var dragging = false;
  handle.addEventListener("pointerdown", function(e) {
    dragging = true;
    startY = e.clientY;
    startH = editorHeight;
    handle.setPointerCapture(e.pointerId);
    document.body.style.cursor = "ns-resize";
    e.preventDefault();
  });
  handle.addEventListener("pointermove", function(e) {
    if (!dragging) return;
    var next = startH + (e.clientY - startY);
    if (next < 160) next = 160;
    if (next > 1400) next = 1400;
    editorHeight = next;
    applyEditorHeight();
  });
  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    try { handle.releasePointerCapture(e.pointerId); } catch (err) {}
    document.body.style.cursor = "";
    try { localStorage.setItem("vo_editor_height", String(editorHeight)); } catch (err) {}
    Streamlit.setFrameHeight(document.body.scrollHeight);
    if (cm) cm.refresh();
  }
  handle.addEventListener("pointerup", endDrag);
  handle.addEventListener("pointercancel", endDrag);
}

function applyEditorHeight() {
  var cmEl = document.querySelector("#cm-wrap .CodeMirror");
  if (cmEl) cmEl.style.height = editorHeight + "px";
  var preview = document.getElementById("preview-panel");
  if (preview) preview.style.height = editorHeight + "px";
  if (cm) cm.refresh();
  if (!fullscreenActive) Streamlit.setFrameHeight(document.body.scrollHeight);
}

function backupFrameStyle(frame) {
  if (!frame || frameStyleBackup) return;
  frameStyleBackup = {
    position: frame.style.position,
    top: frame.style.top,
    left: frame.style.left,
    width: frame.style.width,
    height: frame.style.height,
    zIndex: frame.style.zIndex,
    border: frame.style.border,
    borderRadius: frame.style.borderRadius,
    boxShadow: frame.style.boxShadow,
    background: frame.style.background,
    maxWidth: frame.style.maxWidth
  };
}

function restoreFrameStyle(frame) {
  if (!frame || !frameStyleBackup) return;
  frame.style.position = frameStyleBackup.position;
  frame.style.top = frameStyleBackup.top;
  frame.style.left = frameStyleBackup.left;
  frame.style.width = frameStyleBackup.width;
  frame.style.height = frameStyleBackup.height;
  frame.style.zIndex = frameStyleBackup.zIndex;
  frame.style.border = frameStyleBackup.border;
  frame.style.borderRadius = frameStyleBackup.borderRadius;
  frame.style.boxShadow = frameStyleBackup.boxShadow;
  frame.style.background = frameStyleBackup.background;
  frame.style.maxWidth = frameStyleBackup.maxWidth;
  frameStyleBackup = null;
}

function setFrameOverlay(on) {
  try {
    var frame = window.frameElement;
    if (!frame) return;
    if (on) {
      backupFrameStyle(frame);
      frame.style.position = "fixed";
      frame.style.top = FULLSCREEN_INSET + "px";
      frame.style.left = FULLSCREEN_INSET + "px";
      frame.style.width = "calc(100vw - " + (FULLSCREEN_INSET * 2) + "px)";
      frame.style.height = "calc(100vh - " + (FULLSCREEN_INSET * 2) + "px)";
      frame.style.maxWidth = "none";
      frame.style.zIndex = "2147483647";
      frame.style.border = "1px solid #cbd5e1";
      frame.style.borderRadius = "8px";
      frame.style.boxShadow = "0 18px 48px rgba(15, 23, 42, .28)";
      frame.style.background = "#f7f9fb";
    } else {
      restoreFrameStyle(frame);
    }
  } catch (e) {}
}

function updateFullscreenButton() {
  var btn = document.getElementById("fullscreen-btn");
  if (!btn) return;
  btn.textContent = fullscreenActive ? "Exit full screen" : "Full screen";
  btn.title = fullscreenActive ? "Exit expanded editor" : "Open expanded editor without browser fullscreen";
}

function adjustFullscreenHeight() {
  if (!fullscreenActive) return;
  var chrome = 0;
  ["toolbar", "find-bar", "rules-bar", "counter"].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el || el.classList.contains("hidden")) return;
    chrome += el.getBoundingClientRect().height;
  });
  editorHeight = Math.max(260, window.innerHeight - chrome - 34);
  applyEditorHeight();
  Streamlit.setFrameHeight(window.innerHeight);
}

function setFullscreenMode(on) {
  if (on === fullscreenActive) return;
  fullscreenActive = on;
  document.body.classList.toggle("fullscreen-mode", on);
  setFrameOverlay(on);
  if (on) {
    if (commitTimer) { clearTimeout(commitTimer); commitTimer = null; }
    preFullscreenHeight = editorHeight;
    adjustFullscreenHeight();
  } else {
    if (preFullscreenHeight) editorHeight = preFullscreenHeight;
    preFullscreenHeight = null;
    applyEditorHeight();
    Streamlit.setFrameHeight(document.body.scrollHeight);
    commitValue({ reason: "fullscreen_exit" });
  }
  updateFullscreenButton();
  setTimeout(function() { if (cm) cm.refresh(); }, 50);
}

function toggleFullscreen() {
  setFullscreenMode(!fullscreenActive);
}

function setupFullscreen() {
  updateFullscreenButton();
  window.addEventListener("resize", function() {
    if (fullscreenActive) adjustFullscreenHeight();
  });
  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape" && fullscreenActive && !document.fullscreenElement) {
      setFullscreenMode(false);
    }
  });
}
function scheduleRepaint() {
  requestAnimationFrame(function() {
    if (cm) cm.refresh();
    Streamlit.setFrameHeight(fullscreenActive ? window.innerHeight : document.body.scrollHeight);
    requestAnimationFrame(function() {
      if (cm) cm.refresh();
      setTimeout(function() { if (cm) cm.refresh(); }, 50);
      setTimeout(function() { if (cm) cm.refresh(); }, 200);
    });
  });
}

function initialValue(args) {
  return args.value == null ? "" : String(args.value);
}

function mountEditor(args) {
  var app = document.getElementById("app");
  app.innerHTML = '<div id="editor-shell">' + String(args.toolbar || "") + String(args.find_bar || "") + String(args.paste_menu || "") +
    '<div id="rules-bar" class="bar rules-bar-flex"></div>' +
    '<div id="main-panels">' +
    '  <div id="editor-panel">' +
    '    <div id="cm-wrap"></div>' +
    '    <div id="counter" class="cnt-ok"></div>' +
    '  </div>' +
    '  <div id="preview-panel">' +
    '    <div id="preview-label">Live Preview</div>' +
    '    <div id="preview-content"></div>' +
    '  </div>' +
    '</div>' +
    '<div id="resize-handle" title="Drag to resize editor height"></div>' +
    '</div>';
  setupResize(Number(args.height) || 320);

  counter = document.getElementById("counter");
  previewContent = document.getElementById("preview-content");

  cm = CodeMirror(document.getElementById("cm-wrap"), {
    value: initialValue(args),
    mode: "htmlmixed",
    lineNumbers: true,
    lineWrapping: true,
    autofocus: true,
    indentWithTabs: false,
    tabSize: 2,
    electricChars: false,
    extraKeys: {
      "Ctrl-B": function() { wrapSel("<b>", "</b>"); },
      "Ctrl-I": function() { wrapSel("<i>", "</i>"); },
      "Ctrl-F": function() { toggleFind(); return false; },
      "Ctrl-L": function() { doSingleLine(); }
    }
  });

  cm.on("change", function() {
    if (suppressChange) return;
    dirty = true;
    updateCounter();
    updatePreview();
    scheduleTextAudit();
    scheduleCommit();
  });
  cm.on("blur", function() { scheduleCommit(150); });
  window.addEventListener("pagehide", function() { commitValue({ reason: "pagehide", flush: true }); });
  window.addEventListener("beforeunload", function() { commitValue({ reason: "beforeunload", flush: true }); });

  setupLinkBar();
  setupFindBar();
  setupShortcuts();
  setupPasteMenu();
  setupResizeObserver();
  setupFullscreen();
  setupEditorLanguage();
  ensureSpellDictionary();
  scheduleTextAudit(80);
}

function setupResizeObserver() {
  if (typeof ResizeObserver === "undefined") return;
  var wrap = document.getElementById("cm-wrap");
  if (!wrap) return;
  var ro = new ResizeObserver(function() {
    if (cm) cm.refresh();
  });
  ro.observe(wrap);
  ro.observe(document.body);
}

function applyIncomingValue(args) {
  var next = args.value == null ? "" : String(args.value);
  var forced = Boolean(args.forced);
  var currentText = cm.getValue();
  if (next === currentText) return;
  if (forced) {
    suppressChange = true;
    cm.setValue(next);
    suppressChange = false;
    dirty = false;
    lastSentValue = next;
    updateCounter();
    updatePreview();
    scheduleTextAudit(80);
    scheduleRepaint();
    return;
  }
  if (dirty) return;
  if (lastSentValue !== null && currentText === lastSentValue && next !== lastSentValue) return;
  if (next === "" && currentText !== "") return;
  if (next === lastSentValue) return;
  suppressChange = true;
  cm.setValue(next);
  suppressChange = false;
  lastSentValue = next;
  scheduleTextAudit(80);
}


function commitValue(extra) {
  if (!cm) return;
  if (commitTimer) {
    clearTimeout(commitTimer);
    commitTimer = null;
  }
  // Any commit triggers a Streamlit rerun, and a rerun re-renders the parent
  // page around the full-screen overlay, which makes it flicker. While full
  // screen is open, edits stay local; setFullscreenMode flushes them on exit
  // and page close still forces a commit via flush.
  if (fullscreenActive && !(extra && extra.flush)) return;
  var currentValue = cm.getValue();
  var force = extra && (extra.navigateTo || extra.switchItem);
  if (!force && currentValue === lastSentValue) return;
  lastSentValue = currentValue;
  var payload = Object.assign({ value: currentValue, eventId: String(Date.now()) + ":" + String(++eventCounter) }, extra || {});
  var serialized = JSON.stringify(payload);
  if (serialized === lastSentPayload && !payload.navigateTo && !payload.switchItem) return;
  lastSentPayload = serialized;
  dirty = false;
  Streamlit.setComponentValue(payload);
}

function scheduleCommit(delayMs) {
  if (commitTimer) clearTimeout(commitTimer);
  commitTimer = setTimeout(function() {
    commitValue({ reason: "idle" });
  }, delayMs == null ? 700 : delayMs);
}

function installParentNavigationSync() {
  try {
    var doc = window.parent.document;
    if (parentClickHandler) doc.removeEventListener("click", parentClickHandler, true);
    if (parentMouseDownHandler) doc.removeEventListener("mousedown", parentMouseDownHandler, true);

    parentMouseDownHandler = function(event) {
      if (!cm) return;
      var target = event.target;
      if (!target || !target.closest) return;
      var commitTarget = target.closest(
        "button, input[type='button'], input[type='submit'], " +
        "[role='button'], [data-testid='stButton'] button"
      );
      if (!commitTarget) return;
      commitValue({ reason: "parent_mousedown" });
    };

    parentClickHandler = function(event) {
      if (!cm) return;
      var target = event.target;
      if (!target || !target.closest) return;
      var navTarget = target.closest(
        "[data-testid='stSidebarNav'] a, " +
        "[data-testid='stSidebar'] button, " +
        "[role='tab'], " +
        "[role='radio']"
      );
      if (!navTarget) return;
      commitValue({ reason: "parent_click" });
    };

    doc.addEventListener("mousedown", parentMouseDownHandler, true);
    doc.addEventListener("click", parentClickHandler, true);
    window.addEventListener("pagehide", function() {
      try {
        doc.removeEventListener("mousedown", parentMouseDownHandler, true);
        doc.removeEventListener("click", parentClickHandler, true);
      } catch (e) {}
    });
  } catch (e) {}
}

var lastPreviewHtml = null;
function updatePreview() {
  if (!previewContent || !cm) return;
  var html = cm.getValue();
  if (html === lastPreviewHtml) return;
  lastPreviewHtml = html;
  previewContent.innerHTML = html.trim()
    ? html
    : '<div id="preview-placeholder">HTML preview appears here as you type.</div>';
}

function updateCounter() {
  if (!counter || !cm) return;
  var n = cm.getValue().length;
  counter.textContent = n + " / " + LIMIT + " characters";
  counter.className = n <= LIMIT ? "cnt-ok" : "cnt-bad";
}

function setupEditorLanguage() {
  document.documentElement.setAttribute("lang", "en-US");
  document.body.setAttribute("lang", "en-US");
  if (!cm) return;
  var wrapper = cm.getWrapperElement();
  if (wrapper) {
    wrapper.setAttribute("lang", "en-US");
    wrapper.setAttribute("spellcheck", "false");
  }
}

function scheduleTextAudit(delayMs) {
  if (!cm) return;
  if (auditTimer) clearTimeout(auditTimer);
  auditTimer = setTimeout(runTextAudit, delayMs == null ? 350 : delayMs);
}

function clearAuditMarkers() {
  for (var i = 0; i < auditMarkers.length; i++) {
    auditMarkers[i].clear();
  }
  auditMarkers = [];
}

function loadScriptCandidates(urls) {
  var index = 0;
  function next() {
    if (index >= urls.length) return Promise.reject(new Error("Typo.js unavailable"));
    var url = urls[index++];
    return new Promise(function(resolve, reject) {
      var existing = document.querySelector('script[data-spell-src="' + url + '"]');
      if (existing) { resolve(); return; }
      var script = document.createElement("script");
      script.src = url;
      script.async = true;
      script.setAttribute("data-spell-src", url);
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    }).catch(next);
  }
  return next();
}

function fetchTextCandidates(urls) {
  var index = 0;
  function next() {
    if (index >= urls.length) return Promise.reject(new Error("Dictionary unavailable"));
    var url = urls[index++];
    return fetch(url, { cache: "force-cache" }).then(function(response) {
      if (!response.ok) throw new Error("Dictionary request failed");
      return response.text();
    }).catch(next);
  }
  return next();
}

function ensureSpellDictionary() {
  if (spellDictionary || spellDictionaryLoading || spellDictionaryFailed) return;
  spellDictionaryLoading = true;
  loadScriptCandidates(TYPO_SCRIPT_URLS)
    .then(function() {
      if (typeof Typo === "undefined") throw new Error("Typo.js did not register");
      return Promise.all([fetchTextCandidates(SPELL_AFF_URLS), fetchTextCandidates(SPELL_DIC_URLS)]);
    })
    .then(function(parts) {
      spellDictionary = new Typo("en_US", parts[0], parts[1], { platform: "any" });
    })
    .catch(function() {
      spellDictionaryFailed = true;
    })
    .then(function() {
      spellDictionaryLoading = false;
      scheduleTextAudit(50);
    });
}

function isKeyboardCharacter(ch) {
  if (ch === "\n" || ch === "\r" || ch === "\t") return true;
  if (!ch || ch.length !== 1) return false;
  var code = ch.charCodeAt(0);
  return code >= 32 && code <= 126;
}

function isSuperscriptOrSubscript(ch) {
  return /[\u00B2\u00B3\u00B9\u2070-\u209F]/.test(ch);
}

function decodedEntity(entity) {
  var node = document.createElement("textarea");
  node.innerHTML = entity;
  return node.value;
}

function entityNeedsRedline(entity) {
  var decoded = decodedEntity(entity);
  for (var i = 0; i < decoded.length; i++) {
    if (!isKeyboardCharacter(decoded.charAt(i))) return true;
  }
  return false;
}

function textRangesOutsideTags(text) {
  var ranges = [];
  var start = null;
  var inTag = false;
  var quote = null;
  for (var i = 0; i < text.length; i++) {
    var ch = text.charAt(i);
    if (inTag) {
      if (quote) {
        if (ch === quote) quote = null;
      } else if (ch === '"' || ch === "'") {
        quote = ch;
      } else if (ch === ">") {
        inTag = false;
      }
      continue;
    }
    if (ch === "<") {
      if (start !== null && i > start) ranges.push({ start: start, end: i });
      start = null;
      inTag = true;
      quote = null;
      continue;
    }
    if (start === null) start = i;
  }
  if (start !== null && start < text.length) ranges.push({ start: start, end: text.length });
  return ranges;
}

function markAuditRange(start, end, className, title) {
  if (!cm || start >= end || auditMarkers.length >= MAX_AUDIT_MARKS) return;
  auditMarkers.push(cm.markText(cm.posFromIndex(start), cm.posFromIndex(end), {
    className: className,
    title: title
  }));
}

function isInsideEntity(text, start, end) {
  var amp = text.lastIndexOf("&", start);
  if (amp === -1) return false;
  var semi = text.indexOf(";", amp);
  if (semi === -1 || semi + 1 < end) return false;
  return /^&(?:#[0-9]+|#x[0-9a-f]+|[a-z][a-z0-9]+);$/i.test(text.slice(amp, semi + 1));
}

function shouldSkipSpellWord(word, start, end, fullText) {
  var lower = word.toLowerCase();
  if (word.length < 3) return true;
  if (SPELL_IGNORE_WORDS[lower]) return true;
  if (isInsideEntity(fullText, start, end)) return true;
  if (/[0-9_]/.test(word)) return true;
  if (/^[A-Z]{2,}$/.test(word)) return true;
  if (/[a-z][A-Z]|[A-Z][a-z]+[A-Z]/.test(word)) return true;
  if (/[^A-Za-z']/.test(word)) return true;
  return false;
}

function isWordCorrect(word) {
  if (!spellDictionary) return true;
  var lower = word.toLowerCase();
  if (spellDictionary.check(word) || spellDictionary.check(lower)) return true;
  var stem = lower
    .replace(/'(s|re|ve|d|ll|m)$/i, "")
    .replace(/n't$/i, "");
  return stem !== lower && spellDictionary.check(stem);
}

function runTextAudit() {
  if (!cm) return;
  auditTimer = null;
  clearAuditMarkers();
  var text = cm.getValue();
  if (!text) return;
  var ranges = textRangesOutsideTags(text);
  cm.operation(function() {
    for (var r = 0; r < ranges.length; r++) {
      var segment = text.slice(ranges[r].start, ranges[r].end);

  var margin = 8;

  pasteMenu.classList.remove("hidden");
  var rect = pasteMenu.getBoundingClientRect();

  var top = coords.bottom + 8;

  if (left + rect.width > window.innerWidth - margin) {

  }
  if (top + rect.height > window.innerHeight - margin) {
    top = Math.max(margin, coords.top - rect.height - 8);
